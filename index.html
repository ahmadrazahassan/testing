<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gooomly — marketplace for digital creators. UI kits, 3D assets, templates." />
    <title>Gooomly | Home</title>
    <script>
      (function () {
        try {
          var k = 'gooomly-theme'
          var v = localStorage.getItem(k)
          var dark = v === 'dark'
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
